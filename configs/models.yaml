defaults:
  api_base: http://localhost:8000/v1
  max_model_len: 4096              # önce 4096 ile dene; sonra 8192'ye çıkarsın
  limit_mm_per_prompt: '{"image":1}'
  gpu_memory_utilization: 0.90     # 0.88–0.92 arası genelde güvenli
  trust_remote_code: true


